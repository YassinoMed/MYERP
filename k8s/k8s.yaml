apiVersion: v1
kind: Namespace
metadata:
  name: erpgo
---
apiVersion: v1
kind: Secret
metadata:
  name: erpgo-db-secret
  namespace: erpgo
type: Opaque
stringData:
  mysql-root-password: CHANGE_ME_ROOT
  mysql-user: core
  mysql-password: CHANGE_ME_PASSWORD
  app-key: CHANGE_ME_APP_KEY
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: erpgo-app-config
  namespace: erpgo
data:
  APP_ENV: production
  APP_DEBUG: "false"
  APP_URL: http://localhost
  DB_CONNECTION: mysql
  DB_HOST: mysql
  DB_PORT: "3306"
  DB_DATABASE: core
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  LOG_CHANNEL: stderr
  CACHE_DRIVER: file
  SESSION_DRIVER: file
  QUEUE_CONNECTION: sync
---
