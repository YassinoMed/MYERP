apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: erpgo
spec:
  selector:
    app: mysql
  ports:
    - port: 3306
      targetPort: 3306
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
  namespace: erpgo
spec:
  serviceName: mysql
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: erpgo-db-secret
                  key: mysql-root-password
            - name: MYSQL_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: erpgo-app-config
                  key: DB_DATABASE
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: erpgo-db-secret
                  key: mysql-user
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: erpgo-db-secret
                  key: mysql-password
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
  volumeClaimTemplates:
    - metadata:
        name: mysql-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: erpgo
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: erpgo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: core
  namespace: erpgo
spec:
  selector:
    app: core
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: core
  namespace: erpgo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: core
  template:
    metadata:
      labels:
        app: core
    spec:
      containers:
        - name: app
          image: erpgo/app:latest
          ports:
            - containerPort: 8000
          command: ["php"]
          args: ["-S","0.0.0.0:8000","-t","public"]
          env:
            - name: APP_ENV
              valueFrom:
                configMapKeyRef:
                  name: erpgo-app-config
                  key: APP_ENV
            - name: APP_DEBUG
              valueFrom:
                configMapKeyRef:
                  name: erpgo-app-config
                  key: APP_DEBUG
            - name: APP_URL
              valueFrom:
                configMapKeyRef:
                  name: erpgo-app-config
                  key: APP_URL
            - name: APP_KEY
              valueFrom:
                secretKeyRef:
                  name: erpgo-db-secret
                  key: app-key
            - name: DB_CONNECTION
              valueFrom:
                configMapKeyRef:
                  name: erpgo-app-config
                  key: DB_CONNECTION
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: erpgo-app-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: erpgo-app-config
                  key: DB_PORT
            - name: DB_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: erpgo-app-config
                  key: DB_DATABASE
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: erpgo-db-secret
                  key: mysql-user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: erpgo-db-secret
                  key: mysql-password
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: erpgo-app-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: erpgo-app-config
                  key: REDIS_PORT
            - name: LOG_CHANNEL
              valueFrom:
                configMapKeyRef:
                  name: erpgo-app-config
                  key: LOG_CHANNEL
            - name: CACHE_DRIVER
              valueFrom:
                configMapKeyRef:
                  name: erpgo-app-config
                  key: CACHE_DRIVER
            - name: SESSION_DRIVER
              valueFrom:
                configMapKeyRef:
                  name: erpgo-app-config
                  key: SESSION_DRIVER
            - name: QUEUE_CONNECTION
              valueFrom:
                configMapKeyRef:
                  name: erpgo-app-config
                  key: QUEUE_CONNECTION
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: erpgo
spec:
  type: LoadBalancer
  selector:
    app: gateway
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: erpgo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: nginx:1.25-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: gateway-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
      volumes:
        - name: gateway-config
          configMap:
            name: erpgo-gateway-config
