      DB_PORT: "3306"
      DB_DATABASE: billing
      DB_USERNAME: billing
      DB_PASSWORD: secret
    depends_on:
      billing-db:
        condition: service_healthy
      core:
        condition: service_started

  billing-db:
    <<: *mysql-service
