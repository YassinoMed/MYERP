

networks:
  erp_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  redis_data: {}
  kafka_data: {}
  zookeeper_data: {}
  core_db_data: {}
  billing_db_data: {}
  approvals_db_data: {}
  mrp_db_data: {}
  quality_db_data: {}
  maintenance_db_data: {}
  chatgpt_db_data: {}
  hotel_db_data: {}
  traceability_db_data: {}
  cropplanning_db_data: {}
  cooperative_db_data: {}
  hedging_db_data: {}
  hrops_db_data: {}
  operations_db_data: {}
  platform_db_data: {}
  industry_db_data: {}
  btp_db_data: {}
  integrations_db_data: {}
  saas_db_data: {}

# =====================================================================
# YAML ANCHORS (DRY — Don't Repeat Yourself)
# =====================================================================

x-laravel-service: &laravel-service
  build:
    context: .
    dockerfile: Dockerfile
  image: local-erp-php:8.4
  restart: unless-stopped
  working_dir: /var/www/html
  volumes:
    - ./:/var/www/html
  networks:
    - erp_network
  environment: &laravel-env-base
    APP_ENV: production
    APP_DEBUG: "false"
    REDIS_HOST: redis
    KAFKA_BOOTSTRAP_SERVERS: kafka:29092
  healthcheck:
    test: ["CMD-SHELL", "curl -sf http://localhost:8000/health 2>/dev/null || php -r 'echo ok;' || exit 1"]
    interval: 20s
    timeout: 10s
    retries: 5
    start_period: 40s
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"
  deploy:
    resources:
      limits:
        memory: 512M
      reservations:
        memory: 128M

x-mysql-service: &mysql-service
  image: mysql:8.0
  restart: unless-stopped
  networks:
    - erp_network
  environment: &mysql-env
    MYSQL_ROOT_PASSWORD: root
    MYSQL_ROOT_HOST: "%"
  healthcheck:
    test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
    interval: 15s
    timeout: 5s
    retries: 20
    start_period: 90s
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"
  deploy:
    resources:
      limits:
        memory: 1G
      reservations:
        memory: 256M

# =====================================================================
#                         S E R V I C E S
# =====================================================================
services:

  # ==================================================================
  # 1. API GATEWAY — SINGLE ENTRY POINT (seul port exposé)
  # ==================================================================
  gateway:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "8080:80"
      - "443:443"
    volumes:
      - ./docker/gateway.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - erp_network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    depends_on:
      core:
        condition: service_started

  # ==================================================================
  # 2. INFRASTRUCTURE — Cache & Event Streaming
  # ==================================================================
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # NO external ports — internal only
    volumes:
      - redis_data:/data
    networks:
      - erp_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    restart: unless-stopped
    # NO external ports — internal only
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    networks:
      - erp_network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    restart: unless-stopped
    # NO external ports — internal only
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_ZOOKEEPER_SESSION_TIMEOUT_MS: 60000
      KAFKA_ZOOKEEPER_CONNECTION_TIMEOUT_MS: 60000
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - erp_network
    depends_on:
      zookeeper:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:29092 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ==================================================================
  # 3. CORE SERVICE — Le noyau central de l'ERP
  # ==================================================================
  core:
    <<: *laravel-service
    command: php artisan serve --host=0.0.0.0 --port=8000
    # NO external ports — only accessible via gateway
    environment:
      <<: *laravel-env-base
      DB_CONNECTION: mysql
      DB_HOST: core-db
      DB_PORT: "3306"
      DB_DATABASE: core
      DB_USERNAME: core
      DB_PASSWORD: secret
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    depends_on:
      core-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started

  core-db:
    <<: *mysql-service
    container_name: core-db
    environment:
      <<: *mysql-env
      MYSQL_DATABASE: core
      MYSQL_USER: core
      MYSQL_PASSWORD: secret
    # NO external ports — internal only
    volumes:
      - core_db_data:/var/lib/mysql

  # ==================================================================
  # 4. BILLING SERVICE — Facturation
  # ==================================================================
  billing:
    <<: *laravel-service
    command: php artisan serve --host=0.0.0.0 --port=8001
    environment:
      <<: *laravel-env-base
      DB_CONNECTION: mysql
