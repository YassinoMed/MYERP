# =====================================================================
# ERPGo SaaS — Nginx API Gateway Configuration
# =====================================================================
# Architecture: BD unique — tous les services via core_upstream
# =====================================================================

# -------------------------------------------------------
# UPSTREAM DEFINITIONS
# -------------------------------------------------------
upstream core_upstream {
    least_conn;
    server core:8080;
    # Pour scaler : docker compose up -d --scale core=3
}

upstream hedging_upstream {
    # Fallback sur core pour permettre au gateway de démarrer même si le
    # service hedging n'est pas lancé dans la stack minimale.
    server core:8080;
}

# -------------------------------------------------------
# RATE LIMITING
# -------------------------------------------------------
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;

# -------------------------------------------------------
# SERVER BLOCK
# -------------------------------------------------------
server {
    listen 80;
    server_name _;

    # --- Security Headers ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    server_tokens off;
    client_max_body_size 50M;

    # --- Timeouts ---
    proxy_connect_timeout 30s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    # ==============================================================
    # HEALTH CHECK
    # ==============================================================
    location /health {
        access_log off;
        return 200 '{"status":"ok","service":"gateway"}';
        add_header Content-Type application/json;
    }

    # ==============================================================
    # LOGIN — Rate limiting strict
    # ==============================================================
    location /api/login {
        limit_req zone=login_limit burst=3 nodelay;
        proxy_pass http://core_upstream/api/login;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ==============================================================
    # HEDGING SERVICE — Couverture Agricole (service séparé)
    # ==============================================================
    location /hedging/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://hedging_upstream/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Service-Name "hedging";
    }

    # ==============================================================
    # API — Tout /api/* route vers core
    # ==============================================================
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://core_upstream/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Service-Name "core-api";
    }

    # ==============================================================
    # STATIC ASSETS — Cache agressif
    # ==============================================================
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://core_upstream;
        proxy_set_header Host $host;
        proxy_cache_valid 200 7d;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ==============================================================
    # DEFAULT — Frontend / Web UI
    # ==============================================================
    location / {
        proxy_pass http://core_upstream/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ==============================================================
    # ERROR PAGES
    # ==============================================================
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        return 503 '{"error":"Service temporarily unavailable","code":503}';
        add_header Content-Type application/json;
    }
}
